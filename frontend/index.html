<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Distill Your Bro</title>
    <style>
      :root { --blue:#1e40af; --bg:#f8fafc; --card:#ffffff; --muted:#6b7280; }
      body { margin:0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; background:var(--bg); color:#0f172a; }
      header { background:var(--blue); color:#fff; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; }
      header h1 { margin:0; font-size:18px; }
      .nav { display:flex; gap:12px; }
      .nav a { color:#fff; text-decoration:none; padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.25); }
      .container { max-width: 980px; margin: 24px auto; padding: 0 16px; }
      .card { background:var(--card); border:1px solid #e5e7eb; border-radius:12px; padding:16px; box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06); }
      .muted { color:var(--muted); }
      .grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap:16px; margin-top: 16px; }
      .fab { position:fixed; right:24px; bottom:24px; width:56px; height:56px; border-radius:50%; background:var(--blue); color:#fff; display:flex; align-items:center; justify-content:center; font-size:28px; border:none; box-shadow:0 8px 24px rgba(30,64,175,.24); cursor:pointer; }
      .status { margin-top:8px; font-size:12px; }
      code { background:#f1f5f9; padding:2px 6px; border-radius:6px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Distill Your Bro</h1>
      <nav class="nav">
        <a href="#souls">SOUL 管理</a>
        <a href="#sessions">对话管理</a>
      </nav>
    </header>
    <main class="container">
      <div class="card">
        <h2 style="margin:0 0 8px 0">欢迎 👋</h2>
        <p class="muted">这是本地开发版。后端 API 未接入时，页面仅做占位展示。</p>
        <div id="health" class="status muted">后端健康检查中...</div>
      </div>

      <section id="souls" style="margin-top:16px;">
        <div class="card">
          <h3 style="margin:0 0 8px 0">SOUL 列表</h3>
          <div id="souls-list" class="grid"></div>
        </div>
      </section>
    </main>

    <button class="fab" title="创建 SOUL" onclick="alert('前端占位：创建 SOUL')">+</button>

    <script>
      async function ping() {
        const el = document.getElementById('health');
        try {
          const res = await fetch('/api/health');
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const data = await res.json();
          el.textContent = '后端已就绪：' + JSON.stringify(data);
        } catch (e) {
          el.textContent = '后端未就绪：' + e;
          el.style.color = '#b91c1c';
        }
      }
      ping();
    </script>
  </body>
  </html>
